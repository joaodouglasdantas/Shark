<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shark — Suas finanças, seu controle</title>
  <link rel="icon" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN com configuração personalizada -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            wave: {
              DEFAULT: '#0EA5E9',
              50:  '#F0F9FF',
              100: '#E0F2FE',
              200: '#BAE6FD',
              300: '#7DD3FC',
              400: '#38BDF8',
              500: '#0EA5E9',
              600: '#0284C7',
              700: '#0369A1',
              800: '#075985',
              900: '#0C4A6E',
            },
            ink: {
              50:  '#F8FAFC',
              100: '#F1F5F9',
              200: '#94A3B8',
              300: '#64748B',
              400: '#475569',
              500: '#334155',
              600: '#1E293B',
              700: '#0F172A',
              800: '#080E1C',
              900: '#030912',
            },
          },
          boxShadow: {
            wave: '0 0 0 1px rgba(14,165,233,0.35), 0 10px 30px -10px rgba(14,165,233,0.45)',
            glow: '0 0 20px rgba(14,165,233,0.25)',
          },
          backgroundImage: {
            'radial-fade': 'radial-gradient(ellipse at top, rgba(14,165,233,0.10), transparent 60%)',
          },
        }
      }
    }
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Estilos customizados -->
  <link rel="stylesheet" href="app.css">
</head>
<body class="bg-ink-900 text-ink-50 min-h-screen flex flex-col antialiased" style="background-image: radial-gradient(ellipse at top, rgba(14,165,233,0.08), transparent 60%);">

  <!-- Navbar -->
  <header id="navbar" class="sticky top-0 z-40 bg-ink-900/80 backdrop-blur border-b border-ink-600/50"></header>

  <!-- Flash messages -->
  <div id="flash-container" class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8 pt-3"></div>

  <!-- Conteúdo principal -->
  <main id="main" class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8 py-8 flex-1"></main>

  <!-- Footer -->
  <footer id="footer" class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8 py-6 text-xs text-ink-300 border-t border-ink-600/50 mt-8">
    <div class="flex items-center justify-between">
      <span>&copy; <span id="footer-year"></span> <span class="text-wave-400 font-semibold">Shark</span>. Feito para decisões rápidas.</span>
      <span class="hidden sm:block text-ink-400">v1.0</span>
    </div>
  </footer>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(3,9,18,0.85); backdrop-filter: blur(4px);">
    <div id="modal-content" class="w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-xl"></div>
  </div>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
